    <script>
      // Show the first-time hint exactly once per device.
      (function () {
        var KEY = "wedding-mobile-tip-shown";
        var tip = document.getElementById("firstTimeTip");
        if (!tip) return;
        try { if (localStorage.getItem(KEY) === "1") return; } catch (_) {}
        tip.hidden = false;
        setTimeout(function () { tip.classList.add("is-fading"); }, 5000);
        setTimeout(function () { tip.remove(); }, 6200);
        try { localStorage.setItem(KEY, "1"); } catch (_) {}
      })();

      // Tap the cover — a heart floats up
      (function () {
        var cover = document.getElementById("wCover");
        var layer = document.getElementById("wHearts");
        if (!cover || !layer) return;
        var glyphs = ["♥", "❤", "💖", "💕"];
        function spawn(e) {
          // Don't spawn when tapping the begin button — let it navigate
          if (e.target.closest(".w-cover__begin")) return;
          var pt = e.touches ? e.touches[0] : e;
          var h = document.createElement("span");
          h.className = "w-hearts__h";
          h.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
          h.style.color = ["#d97f7f", "#a64863", "#e0a956", "#fff"][Math.floor(Math.random() * 4)];
          h.style.left = pt.clientX + "px";
          h.style.top  = pt.clientY + "px";
          layer.appendChild(h);
          setTimeout(function () { h.remove(); }, 1900);
        }
        cover.addEventListener("click", spawn);
        cover.addEventListener("touchstart", spawn, { passive: true });
      })();
    </script>
